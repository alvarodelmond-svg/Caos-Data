<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caos Data 2.0</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1a1a1a;
            color: #dcdde1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            border: 2px solid #e84118;
            padding: 30px;
            background: #2f3640;
            box-shadow: 0 0 20px rgba(232, 65, 24, 0.5);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h2 { color: #e84118; text-transform: uppercase; letter-spacing: 2px;}

        .form-group {
            margin: 25px 0;
            padding: 15px;
            border: 1px dashed #7f8fa6;
            background: rgba(0,0,0,0.2);
        }

        select {
            padding: 8px;
            background-color: #353b48;
            color: white;
            border: 1px solid #e84118;
            cursor: pointer;
            font-family: inherit;
        }

        /* O Mês Voador */

        .marquee-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            background: #192a56;
            padding: 10px 0;
        }

        .marquee-content {
            display: inline-block;
            animation: voar 4s linear infinite alternate;
        }

        .marquee-content button {
            background: #4cd137;
            border: none;
            padding: 5px 10px;
            margin: 0 5px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
        }
        
        .marquee-content button.selecionado {

            background: #e84118;
            color: white;
        }

        @keyframes voar {
            0% { transform: translateX(50%); }
            100% { transform: translateX(-150%); }
        }

        /* Teclado Amnésico */
        .numpad {
            display: flex;
            flex-wrap: wrap;
            width: 160px;
            margin: 10px auto;
            gap: 5px;
            justify-content: center;
        }

        .numpad button {
            width: 45px;
            height: 45px;
            font-size: 1.2em;
            background: #718093;
            color: white;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .numpad button:hover {
            background: #e84118;
        }

        #ano-input {
            width: 100px;
            text-align: center;
            font-size: 1.5em;
            padding: 5px;
            margin-bottom: 10px;
            background: #2f3640;
            color: #e84118;

            border: 1px solid #7f8fa6;
            pointer-events: none; /* Impede de digitar no teclado físico */
        }

        .submit-btn {
            margin-top: 20px;
            padding: 15px;
            width: 100%;
            background-color: #00a8ff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .dica {
            font-size: 0.6em;
            color: #7f8fa6;
            margin-top: 5px;
            display: block;
        }

    </style>
</head>
<body>

    <div class="container">
        <h2>Caos Data 2.0</h2>

        <div class="form-group">
            <label>Dia (Boa sorte):</label><br>
            <select id="dia"></select>
        </div>

        <div class="form-group">
            <label>Mês (Acerte o alvo):</label>
            <div class="marquee-container">
                <div class="marquee-content" id="mes-container">
                    <button value="01">Jan</button>
                    <button value="02">Fev</button>
                    <button value="03">Mar</button>
                    <button value="04">Abr</button>
                    <button value="05">Mai</button>
                    <button value="06">Jun</button>
                    <button value="07">Jul</button>
                    <button value="08">Ago</button>
                    <button value="09">Set</button>
                    <button value="10">Out</button>
                    <button value="11">Nov</button>
                    <button value="12">Dez</button>
                </div>
            </div>
            <span id="mes-display" style="color:#4cd137; font-size:0.8em;">Nenhum selecionado</span>
        </div>

        <div class="form-group">
            <label>Ano (Digite rápido):</label><br>
            <input type="text" id="ano-input" value="" readonly placeholder="YYYY">
            <div class="numpad" id="numpad">
                <button class="num-key">1</button>
                <button class="num-key">2</button>
                <button class="num-key">3</button>
                <button class="num-key">4</button>
                <button class="num-key">5</button>
                <button class="num-key">6</button>
                <button class="num-key">7</button>
                <button class="num-key">8</button>
                <button class="num-key">9</button>
                <button class="num-key">0</button>
                <button id="clear-btn" style="width: 100px; background:#c23616;">Limpar</button>
            </div>

        </div>

        <button class="submit-btn" id="btn-submit">Registrar Data</button>
        <span class="dica">Dica: Às vezes é preciso mudar (shift) a atitude para confirmar.</span>
    </div>

    <script>
        // 1. Dias em Romanos e Embaralhados
        const romanos = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII", "XIII", "XIV", "XV", "XVI", "XVII", "XVIII", "XIX", "XX", "XXI", "XXII", "XXIII", "XXIV", "XXV", "XXVI", "XXVII", "XXVIII", "XXIX", "XXX", "XXXI"];
        // Mapeia o valor real para o romano
        let diasObj = romanos.map((rom, index) => ({ val: index + 1, text: rom }));
        // Embaralha o array
        diasObj.sort(() => Math.random() - 0.5);

        const selectDia = document.getElementById('dia');
        diasObj.forEach(d => {
            let opt = document.createElement('option');
            opt.value = d.val.toString().padStart(2, '0');
            opt.textContent = d.text;
            selectDia.appendChild(opt);
        });

        // 2. Mês Voador
        let mesSelecionado = null;
        const botoesMes = document.querySelectorAll('.marquee-content button');
        const mesDisplay = document.getElementById('mes-display');

        botoesMes.forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                botoesMes.forEach(b => b.classList.remove('selecionado'));
                this.classList.add('selecionado');
                mesSelecionado = this.value;
                mesDisplay.textContent = `Mês selecionado: ${this.textContent}`;
            });

        });

        // 3. Teclado Amnésico
        const numpad = document.getElementById('numpad');
        const numKeys = document.querySelectorAll('.num-key');
        const anoInput = document.getElementById('ano-input');
        const clearBtn = document.getElementById('clear-btn');

        // Embaralha sempre que o mouse entra na área do teclado
        numpad.addEventListener('mouseenter', () => {
            numKeys.forEach(btn => {
                btn.style.order = Math.floor(Math.random() * 10);
            });
        });

        numKeys.forEach(btn => {
            btn.addEventListener('click', function() {
                if(anoInput.value.length < 4) {
                    anoInput.value += this.textContent;
                }
            });
        });

        clearBtn.addEventListener('click', () => {
            anoInput.value = "";
        });

        // 4. Confirmação Exigente
        const btnSubmit = document.getElementById('btn-submit');
        btnSubmit.addEventListener('click', (e) => {
            // Verifica se a tecla Shift está pressionada
            if (!e.shiftKey) {
                alert("Erro: Você clicou fraco demais. Leia as entrelinhas.");
                return;
            }

            const dia = selectDia.value;
            const ano = anoInput.value;

            if (!mesSelecionado) {
                alert("Você esqueceu de caçar o mês voador!");
                return;
            }
            if (ano.length !== 4) {
                alert("O ano precisa ter 4 dígitos!");
                return;
            }

            alert(`🏆 MISSÃO IMPOSSÍVEL CONCLUÍDA!\nData: ${dia}/${mesSelecionado}/${ano}`);
        });
    </script>

</body>
</html>
