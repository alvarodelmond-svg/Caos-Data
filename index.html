<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio PhiloMap | O Pesadelo da UX</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');

        :root {
            --bg: #000;
            --text: #fff;
            --border: #333;
        }

        body { 
            font-family: 'Comic Neue', cursive; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .chaos-card { 
            background: #111; 
            border: 5px solid #ff00ff; 
            padding: 40px; 
            border-radius: 20px; 
            max-width: 450px; 
            width: 100%; 
            position: relative; 
            box-shadow: 0 0 50px #ff00ff;
            transform: rotate(-2deg);
        }

        .form-group { margin-bottom: 20px; }

        label { 
            display: block; 
            font-size: 1.2rem; 
            color: #00ffff; 
            text-shadow: 2px 2px #ff00ff; 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            text-align: center; 
        }

        .chaos-controls { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        .chaos-item { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            color: #ffff00; 
        }

        input[type="range"] { 
            width: 100%; 
        }

        .btn-chaos-move { 
            position: relative; 
            background: #ff4444; 
            color: #fff; 
            border: 3px solid #fff; 
            padding: 12px 20px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px;
        }

        .final-display { 
            margin-top: 20px; 
            padding: 15px; 
            background: #000; 
            font-family: monospace; 
            text-align: center; 
            border: 2px dashed #00ffff;
            color: #00ffff;
        }

        .btn-save { 
            background: #ffff00; 
            color: #000; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            font-weight: bold; 
            margin-top: 20px;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="chaos-card">
    <div class="form-group">
        <label>Configurações do Caos</label>

        <div class="chaos-controls">
            <div class="chaos-item">
                <span>Confusão:</span>
                <input type="range" min="0" max="100">
            </div>

            <div class="chaos-item">
                <span>Desordem:</span>
                <input type="range" min="0" max="100">
            </div>

            <div class="chaos-item">
                <span>Bug:</span>
                <input type="range" min="0" max="100">
            </div>
        </div>

        <button class="btn-chaos-move" onclick="fugir(this)">
            Clique se conseguir 😈
        </button>

        <div class="final-display" id="resultado">
            Ajuste os níveis de caos...
        </div>

        <button class="btn-save" onclick="salvar()">
            SALVAR (boa sorte)
        </button>
    </div>
</div>

<script>
    function fugir(btn) {
        const x = Math.random() * (window.innerWidth - btn.offsetWidth);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight);

        btn.style.position = "absolute";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }

    function salvar() {
        document.getElementById("resultado").innerText =
            "Parabéns! Você sobreviveu ao pior UX possível 😈";
    }
</script>

</body>
</html>
